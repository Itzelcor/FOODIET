    <div class="container">
        <a class="navbar-brand" href="index.html">Foodiet</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="quienes-somos.html">Quiénes Somos</a></li>
                <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                <li class="nav-item"><a class="nav-link active" href="acceso.html">Acceso</a></li>
                <li class="nav-item"><a class="nav-link" href="historial-paciente.html">Mi Historial</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Acceso de Usuarios</h2>

            <ul class="nav nav-tabs" id="accesoTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Iniciar Sesión</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="registro-tab" data-bs-toggle="tab" data-bs-target="#registro" type="button">Registrarse</button>
                </li>
            </ul>

            <div class="tab-content mt-4">
                <div class="tab-pane fade show active" id="login">
                    <form class="form-section">
                        <div class="mb-3">
                            <label for="loginUsuario" class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="loginUsuario" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPass" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="loginPass" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Acceder</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="registro">
                    <form class="form-section">
                        <div class="mb-3">
                            <label for="regUsuario" class="form-label">Nombre de usuario</label>
                            <input type="text" class="form-control" id="regUsuario" required>
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="regPass" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="regPass" required>
                        </div>
                        <div class="mb-3">
                            <label for="regRol" class="form-label">Tipo de usuario</label>
                            <select class="form-select" id="regRol">
                                <option value="paciente">Paciente</option>
                                <option value="nutricionista">Nutricionista</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Crear Cuenta</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="registro-paciente.html" class="btn btn-outline-primary">Registro completo de paciente</a>
            </div>
        </div>
    </div>
</div>
