<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascension Calculator — Genshin Impact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="site-header">
        <div class="header-inner">
            <div class="logo-area">
                <span class="logo-icon">✦</span>
                <h1 class="site-title">Ascension<br><em>Calculator</em></h1>
            </div>
            <p class="site-subtitle">Genshin Impact — Character Materials</p>
        </div>
        <div class="header-line"></div>
    </header>

    <main class="main-content">

        <section class="calculator-card">
            <div class="card-corner card-corner--tl"></div>
            <div class="card-corner card-corner--tr"></div>
            <div class="card-corner card-corner--bl"></div>
            <div class="card-corner card-corner--br"></div>

            <h2 class="card-title">Select Character & Range</h2>

            <div class="form-grid">

                <div class="form-group form-group--full">
                    <label class="form-label" for="select-personaje">Character</label>
                    <div class="select-wrapper">
                        <select id="select-personaje" class="form-select">
                            <option value="">Loading characters...</option>
                        </select>
                        <span class="select-arrow">⌄</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="nivel-actual">Current Level</label>
                    <div class="select-wrapper">
                        <select id="nivel-actual" class="form-select">
                            <option value="1">1</option>
                            <option value="20">20</option>
                            <option value="40">40</option>
                            <option value="50">50</option>
                            <option value="60">60</option>
                            <option value="70">70</option>
                            <option value="80">80</option>
                        </select>
                        <span class="select-arrow">⌄</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="nivel-objetivo">Target Level</label>
                    <div class="select-wrapper">
                        <select id="nivel-objetivo" class="form-select">
                            <option value="20">20</option>
                            <option value="40">40</option>
                            <option value="50">50</option>
                            <option value="60">60</option>
                            <option value="70">70</option>
                            <option value="80">80</option>
                            <option value="90" selected>90</option>
                        </select>
                        <span class="select-arrow">⌄</span>
                    </div>
                </div>

                <!-- Toggle ascensión: solo visible cuando el nivel objetivo tiene ascensión (no el 90) -->
                <div class="form-group form-group--full hidden" id="grupo-ascension">
                    <label class="form-label">Ascension at target level</label>
                    <label class="toggle-label">
                        <input type="checkbox" id="ascender-al-final" checked>
                        <span class="toggle-track">
                            <span class="toggle-thumb"></span>
                        </span>
                        <span class="toggle-texto" id="toggle-texto">Include ascension at Lv.80</span>
                    </label>
                </div>

                <div class="form-group form-group--full">
                    <button id="btn-calcular" class="btn-calculate">
                        <span class="btn-icon">✦</span>
                        Calculate Materials
                        <span class="btn-icon">✦</span>
                    </button>
                </div>

            </div>
        </section>

        <section id="resultado-section" class="resultado-section hidden">
            <div class="resultado-header">
                <div class="resultado-divider"></div>
                <h2 class="resultado-title" id="resultado-titulo">Materials Required</h2>
                <div class="resultado-divider"></div>
            </div>
            <div id="resultado" class="materiales-grid"></div>
        </section>

    </main>

    <footer class="site-footer">
        <p>Fan-made tool. Not affiliated with HoYoverse.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
